name: Chore
description: 빌드·설정·툴링·문서 등 기능 외 작업
labels: ['type: chore']
body:
  - type: textarea
    id: task
    attributes:
      label: 작업 내용
      description: 무엇을 정리/설정/갱신하나요?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 이유
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: 관련 영역 (복수 선택 가능)
      options:
        - label: 빌드 / 패키징
        - label: CI / Lint
        - label: 문서
        - label: 인덱싱 / 파서
        - label: 검색 (FTS)
        - label: UI

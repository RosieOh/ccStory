name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip native build scripts (better-sqlite3 / electron-builder deps):
      # typecheck, unit tests and the renderer build do not load the native module.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck (main / preload / shared)
        run: npx tsc -p tsconfig.node.json

      - name: Typecheck (renderer)
        run: npx tsc -p tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Renderer build
        run: npx vite build
